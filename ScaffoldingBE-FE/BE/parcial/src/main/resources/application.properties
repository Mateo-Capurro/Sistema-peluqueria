spring.application.name=parcial

# Server
server.port=8080

# H2 Database (archivo: los turnos/tokens sobreviven reinicios)
spring.datasource.url=jdbc:h2:file:~/peluqueria-db/parcialdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# SQL initialization
spring.sql.init.mode=always

# JWT
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LW1pbmltdW0tMzItYml0cw==
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
jwt.issuer=parcial-app

# CORS
cors.allowed-origins=http://localhost:4200,http://localhost:3000

# Mail (SMTP). Real send only when app.mail.enabled=true; credentials via env vars.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=${MAIL_ENABLED:false}
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Credenciales SMTP locales (secrets.properties, gitignored). Si el archivo no existe,
# se ignora y quedan los defaults de arriba (mail off).
spring.config.import=optional:file:./secrets.properties

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
