<div class="space-y-4">
  <h1 class="text-2xl font-bold text-gray-900">Peluqueros</h1>

  @if (loading()) {
    <p class="text-gray-500">Cargando...</p>
  } @else if (error()) {
    <div class="p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">{{ error() }}</div>
  } @else if (peluqueros().length === 0) {
    <p class="text-gray-500">No hay peluqueros disponibles.</p>
  } @else {
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (p of peluqueros(); track p.id) {
        <div class="p-5 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col">
          <h2 class="font-semibold text-gray-900">{{ p.nombre }}</h2>
          <p class="text-sm text-gray-600 mt-1">Atiende {{ p.horaInicio }} a {{ p.horaFin }}</p>
          @if (esCliente()) {
            <button
              (click)="reservarCon(p.id)"
              class="mt-3 self-start bg-blue-600 text-white text-sm rounded px-3 py-1.5 font-medium hover:bg-blue-700">
              Reservar con este peluquero
            </button>
          }
        </div>
      }
    </div>
  }
</div>
