<h2 class="font-serif font-normal text-2xl text-center text-alma-ink mb-6">Iniciar sesi&oacute;n</h2>

@if (error()) {
  <div class="mb-4 p-3 text-sm border-l-2 border-alma-danger bg-alma-accent-soft text-alma-danger">
    {{ error() }}
  </div>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <div>
    <label class="alma-label">Usuario</label>
    <input type="text" formControlName="username" class="alma-input" placeholder="tu_usuario">
    @if (form.controls.username.touched && form.controls.username.invalid) {
      <p class="text-alma-danger text-xs mt-1">Usuario requerido (m&iacute;n 3 caracteres)</p>
    }
  </div>

  <div>
    <label class="alma-label">Contrase&ntilde;a</label>
    <input type="password" formControlName="password" class="alma-input" placeholder="••••••">
    @if (form.controls.password.touched && form.controls.password.invalid) {
      <p class="text-alma-danger text-xs mt-1">M&iacute;nimo 6 caracteres</p>
    }
  </div>

  <button type="submit" [disabled]="form.invalid" class="alma-btn w-full">
    Ingresar
  </button>
</form>

<p class="text-center text-sm text-alma-body mt-5">
  &iquest;No tienes cuenta?
  <a routerLink="/auth/register" class="alma-link">Reg&iacute;strate</a>
</p>
