<h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Iniciar Sesi&oacute;n</h2>

@if (error()) {
  <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">
    {{ error() }}
  </div>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
    <input type="text" formControlName="username"
           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
           placeholder="tu_usuario">
    @if (form.controls.username.touched && form.controls.username.invalid) {
      <p class="text-red-500 text-xs mt-1">Usuario requerido (m&iacute;n 3 caracteres)</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Contrase&ntilde;a</label>
    <input type="password" formControlName="password"
           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
           placeholder="••••••">
    @if (form.controls.password.touched && form.controls.password.invalid) {
      <p class="text-red-500 text-xs mt-1">M&iacute;nimo 6 caracteres</p>
    }
  </div>

  <button type="submit" [disabled]="form.invalid"
          class="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
    Ingresar
  </button>
</form>

<p class="text-center text-sm text-gray-600 mt-4">
  &iquest;No tienes cuenta?
  <a routerLink="/auth/register" class="text-blue-600 hover:underline">Reg&iacute;strate</a>
</p>
