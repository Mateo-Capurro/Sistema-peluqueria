<div class="min-h-screen bg-gray-100">
  <header class="bg-white shadow-sm border-b border-gray-200 h-16">
    <div class="flex items-center justify-between px-4 h-full max-w-7xl mx-auto">
      <span class="text-xl font-semibold text-gray-900">Scaffolding</span>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-600">{{ auth.username() }}</span>
        <button class="px-3 py-1.5 text-sm bg-red-500 text-white rounded hover:bg-red-600" (click)="logout()">
          Salir
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6">
    <router-outlet />
  </main>
</div>
