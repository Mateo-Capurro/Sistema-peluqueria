<div class="min-h-screen bg-gray-100">
  <header class="bg-white shadow-sm border-b border-gray-200">
    <div class="flex items-center justify-between px-4 h-16 max-w-7xl mx-auto">
      <a routerLink="/" class="text-xl font-semibold text-gray-900">Peluquer&iacute;a</a>

      <nav class="flex items-center gap-1 text-sm">
        <a routerLink="/tratamientos" routerLinkActive="bg-blue-100 text-blue-700"
           class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100">Tratamientos</a>
        <a routerLink="/peluqueros" routerLinkActive="bg-blue-100 text-blue-700"
           class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100">Peluqueros</a>

        @if (auth.role() === 'CLIENTE') {
          <a routerLink="/reservar" routerLinkActive="bg-blue-100 text-blue-700"
             class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100">Reservar</a>
          <a routerLink="/mis-turnos" routerLinkActive="bg-blue-100 text-blue-700"
             class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100">Mis turnos</a>
        }
        @if (auth.role() === 'PELUQUERO') {
          <a routerLink="/agenda" routerLinkActive="bg-blue-100 text-blue-700"
             class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100">Agenda</a>
        }
      </nav>

      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-600">{{ auth.username() }}</span>
        <span class="text-xs px-2 py-0.5 rounded bg-gray-200 text-gray-700">{{ auth.role() }}</span>
        <button class="px-3 py-1.5 text-sm bg-red-500 text-white rounded hover:bg-red-600" (click)="logout()">
          Salir
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6">
    <router-outlet />
  </main>
</div>
